<section class="hero" id="hero">
  <div class="hero__overlay"></div>
  <div class="hero__content">
    <span class="hero__badge">Excelência em Mineração</span>
    <h1 class="hero__title">
      Areia Sílica de<br>
      <strong>Alta Pureza</strong>
    </h1>
    <p class="hero__subtitle">
      Fornecimento industrial com qualidade certificada para os mais exigentes
      segmentos do mercado. Soluções completas em areia sílica para sua empresa.
    </p>
    <div class="hero__actions">
      <a class="hero__btn-primary" (click)="scrollTo('contato')" role="button" tabindex="0">
        Solicitar Orçamento
      </a>
      <a class="hero__btn-secondary" (click)="scrollTo('produtos')" role="button" tabindex="0">
        Nossos Produtos
      </a>
    </div>

    <!-- Indicadores de destaque -->
    <div class="hero__stats">
      <div class="hero__stat">
        <span class="hero__stat-value">99.5%</span>
        <span class="hero__stat-label">Pureza SiO₂</span>
      </div>
      <div class="hero__stat">
        <span class="hero__stat-value">+500</span>
        <span class="hero__stat-label">Clientes Ativos</span>
      </div>
      <div class="hero__stat">
        <span class="hero__stat-value">15+</span>
        <span class="hero__stat-label">Anos de Mercado</span>
      </div>
    </div>
  </div>
</section>
